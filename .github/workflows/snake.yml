name: Generate Snake

on:
  schedule:
    # This runs every 12 hours automatically
    - cron: "0 */12 * * *"
  workflow_dispatch: # This lets you run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: Platane/snk@v3
        with:
          github_user_name: abuki-dev
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#8e44ad&color_dots=#ecf0f1,#bdc3c7,#95a5a6,#7f8c8d,#34495e

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
